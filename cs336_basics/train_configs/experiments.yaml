smoke:
  name: "smoke"
  model_dimension:
    vocab_size: 10000
    context_length: 128
    num_layers: 4
    d_model: 128
    num_heads: 8
    d_ff: 336
    theta: 10000
  train_params:
    batch_size: 2
    grad_accum_steps: 4
    max_steps: 10
    grad_max: 1.0
    adam_params:
      weight_decay: 0.01
      betas:
        - 0.9
        - 0.999
      eps: 1.0e-8
    lr_schedule:
      warmup_iters: 10
      cosine_cycle_iters: 50
      a_min: 1.0e-4
      a_max: 1.0e-3


